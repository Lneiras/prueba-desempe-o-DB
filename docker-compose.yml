version: '3.8'

services:
  db_prueba:
    image: postgres:15-alpine
    container_name: Prueba-base-de-datos
    restart: always
    environment:
      POSTGRES_DB: bd_Laura_Neira_PuertaDeOro
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: